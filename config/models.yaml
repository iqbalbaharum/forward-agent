# Agent Model Configuration
# Each agent can have its own model, temperature, and settings
# If an agent is not listed here, the system will raise an error

agents:
  requirement:
    model: "meta-llama/llama-3.1-8b-instruct"
    temperature: 0.3
    max_tokens: 4000
    description: "Analyzes and structures raw requirements"

  epic:
    model: "meta-llama/llama-3.1-8b-instruct"
    temperature: 0.3
    max_tokens: 4000
    description: "Transforms requirements into logical epics"

  story:
    model: "meta-llama/llama-3.1-8b-instruct"
    temperature: 0.4
    max_tokens: 4000
    description: "Breaks down epics into user stories"

  test_generator:
    model: "meta-llama/llama-3.1-8b-instruct"
    temperature: 0.2
    max_tokens: 3000
    description: "Generates pytest unit tests"

  collaborate:
    model: "meta-llama/llama-3.1-8b-instruct"
    temperature: 0.3
    max_tokens: 2000
    description: "Intelligently updates story technical notes based on user feedback"

  speculate:
    model: "meta-llama/llama-3.1-8b-instruct"
    temperature: 0.4
    max_tokens: 4000
    description: "Classifies user feedback as simple (update notes) or complex (generate new epic/stories)"

  reject:
    model: "meta-llama/llama-3.1-8b-instruct"
    temperature: 0.4
    max_tokens: 4000
    description: "Analyzes rejection feedback to realign stories with user priorities"

  # code:
  #   model: "meta-llama/llama-3.1-8b-instruct"
  #   temperature: 0.3
  #   max_tokens: 4000
  #   description: "Implements code from stories"

  # review:
  #   model: "meta-llama/llama-3.1-8b-instruct"
  #   temperature: 0.2
  #   max_tokens: 3000
  #   description: "Reviews code quality"

  # mockup:
  #   model: "meta-llama/llama-3.1-8b-instruct"
  #   temperature: 0.3
  #   max_tokens: 3000
  #   description: "Generates mockups using Figma MCP"

# Global defaults
defaults:
  base_url: "https://openrouter.ai/api/v1"
  timeout: 60
  fallback_model: "meta-llama/llama-3.1-8b-instruct"

# Registered agents - must match config in orchestrator
registered_agents:
  - requirement
  - epic
  - story
  - test_generator
  - collaborate
  - speculate
  - reject